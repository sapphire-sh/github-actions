name: Shared Notification

on:
  workflow_call:
    inputs:
      result:
        required: true
        type: string
      context:
        required: true
        type: string
      job:
        required: false
        type: string
        default: ''
      runner:
        required: false
        type: string
        default: self-hosted
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      MATTERMOST_CHANNEL_ID:
        required: false
      MATTERMOST_TOKEN:
        required: false
      MATTERMOST_URL:
        required: false
      TAILSCALE_OAUTH_CLIENT_ID:
        required: false
      TAILSCALE_OAUTH_CLIENT_SECRET:
        required: false

permissions: {}

jobs:
  notify:
    name: Notification
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/github-actions

      - name: Prepare
        id: status
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          RESULT: ${{ inputs.result }}
          CONTEXT: ${{ inputs.context }}
          JOB: ${{ inputs.job }}
          RUN_STARTED_AT: ${{ github.run_started_at }}
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          COMMIT_AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] && echo "notify_slack=true" >> "$GITHUB_OUTPUT" || echo "notify_slack=false" >> "$GITHUB_OUTPUT"
          [ -n "$MATTERMOST_CHANNEL_ID" ] && [ -n "$MATTERMOST_TOKEN" ] && [ -n "$MATTERMOST_URL" ] && [ -n "$TAILSCALE_OAUTH_CLIENT_ID" ] && [ -n "$TAILSCALE_OAUTH_CLIENT_SECRET" ] && echo "notify_mattermost=true" >> "$GITHUB_OUTPUT" || echo "notify_mattermost=false" >> "$GITHUB_OUTPUT"
          PAYLOAD=$(node .github/scripts/notify-build-payload.js)
          echo "payload<<PAYLOAD_EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "PAYLOAD_EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack message
        if: steps.status.outputs.notify_slack == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.status.outputs.payload }}

      - name: Connect to Tailscale
        if: steps.status.outputs.notify_mattermost == 'true'
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Start Mattermost proxy
        if: steps.status.outputs.notify_mattermost == 'true'
        env:
          MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
        run: |
          node .github/scripts/notify-mattermost-proxy.js &
          echo $! > /tmp/mm_proxy.pid
          sleep 1

      - name: Send Mattermost message
        if: steps.status.outputs.notify_mattermost == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: http://127.0.0.1:8765
          webhook-type: incoming-webhook
          payload: ${{ steps.status.outputs.payload }}

      - name: Stop Mattermost proxy
        if: always() && steps.status.outputs.notify_mattermost == 'true'
        run: kill "$(cat /tmp/mm_proxy.pid)" 2>/dev/null || true
