name: Shared Docker CI

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: false
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    if: inputs.run_tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test

  build-and-push:
    needs: [test]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure insecure registry
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: |
          echo "{\"insecure-registries\": [\"$REGISTRY_HOST\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Connect to Tailscale
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."${{ secrets.REGISTRY_HOST }}"]
              http = true
              insecure = true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ secrets.REGISTRY_HOST }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: curl -X POST "$PORTAINER_WEBHOOK_URL"

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always()
    steps:
      - name: Send Slack message
        env:
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          IMAGE_NAME: ${{ inputs.image_name }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          if [ "$TEST_RESULT" = "failure" ]; then
            STATUS="failure"
          else
            STATUS="$BUILD_RESULT"
          fi
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            EMOJI=":white_check_mark:"
            TEXT="Build succeeded"
          else
            COLOR="danger"
            EMOJI=":x:"
            TEXT="Build failed"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"text\": \"$EMOJI *$TEXT* — \`$IMAGE_NAME\`\n<$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID|View workflow>\",
                \"footer\": \"$REPOSITORY @ $REF_NAME\"
              }]
            }"
